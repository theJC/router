supergraph:
  listen: 127.0.0.1:45001

include_subgraph_errors:
  all: true

override_subgraph_url:
  products: http://127.0.0.1:45002

coprocessor:
  url: unix:///tmp/.tmpRfcLiJ/coprocessor.sock
  timeout: 5s
  client:
    experimental_http2: http2only
  router:
    request:
      headers: true
      body: true
      context: true
      sdl: true
    response:
      headers: true
      body: true
      context: true
      sdl: true
  subgraph:
    all:
      request:
        headers: true
        body: true
        context: true
        uri: true
        method: true
        service_name: true
